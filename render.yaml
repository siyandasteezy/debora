services:
  - type: web
    name: mental-health-engine-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mhe-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: mhe-redis
          type: redis
          property: connectionString
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_PORT
        value: "6333"
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: mental_health_knowledge
      - key: CORS_ORIGINS
        value: https://debora.vercel.app
      - key: EMBEDDING_PROVIDER
        value: local
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  - type: redis
    name: mhe-redis
    plan: free
    ipAllowList: []

databases:
  - name: mhe-postgres
    plan: free
    databaseName: mental_health_engine
    user: mhe_user
